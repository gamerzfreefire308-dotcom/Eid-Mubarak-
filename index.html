<!DOCTYPE html>
<html>
<head>
  <title>Eid Mubarak 🌙</title>

  <style>
    body{
      margin:0;
      height:100vh;
      overflow:hidden;
      background:black;
      font-family:Arial;
      display:flex;
      justify-content:center;
      align-items:center;
      color:white;
      text-align:center;
    }

    #screen{
      position:absolute;
      width:100%;
      height:100%;
      background:black;
      display:flex;
      justify-content:center;
      align-items:center;
      z-index:5;
    }

    #screen button{
      padding:15px 25px;
      font-size:18px;
      background:gold;
      border:none;
      border-radius:10px;
      cursor:pointer;
    }

    .box{ display:none; }

    h1{ color:gold; font-size:55px; }

    p{ font-size:20px; margin-top:20px; }

    .heart{
      position:absolute;
      font-size:20px;
      animation: floatUp 5s linear infinite;
    }

    @keyframes floatUp{
      0%{transform:translateY(100vh); opacity:1;}
      100%{transform:translateY(-10vh); opacity:0;}
    }

    .star{
      position:absolute;
      width:3px;
      height:3px;
      background:white;
      border-radius:50%;
    }
  </style>
</head>

<body>

<div id="screen">
  <button onclick="start()">🎁 Click to open Eid surprise</button>
</div>

<div class="box" id="box">
  <h1>🌙 Eid Mubarak</h1>
  <p id="msg"></p>
</div>

<!-- 🎵 AUDIO -->
<audio id="music" loop>
  <source src="https://cdn.pixabay.com/download/audio/2021/09/16/audio_c8c8a0f4a0.mp3" type="audio/mpeg">
</audio>

<script>

function start(){

  document.getElementById("screen").style.display="none";
  document.getElementById("box").style.display="block";

  let music = document.getElementById("music");

  // 🔥 IMPORTANT FIX (unlock audio)
  music.load();
  music.play().then(()=>{
    console.log("Music playing");
  }).catch(()=>{
    // backup click unlock
    document.body.addEventListener("click", ()=>music.play(), {once:true});
  });

  typing();
  hearts();
  stars();
}

/* typing */
let text = "Eid Mubarak 🌙✨ Tum naraz ho sakti ho... lekin meri dua hamesha tumhare sath hai 💖";
let i = 0;

function typing(){
  if(i < text.length){
    document.getElementById("msg").innerHTML += text.charAt(i);
    i++;
    setTimeout(typing, 50);
  }
}

/* hearts */
function hearts(){
  setInterval(()=>{
    let h=document.createElement("div");
    h.className="heart";
    h.innerHTML="💖";
    h.style.left=Math.random()*100+"vw";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),5000);
  },300);
}

/* stars */
function stars(){
  for(let i=0;i<80;i++){
    let s=document.createElement("div");
    s.className="star";
    s.style.top=Math.random()*100+"vh";
    s.style.left=Math.random()*100+"vw";
    document.body.appendChild(s);
  }
}

</script>

</body>
</html>
